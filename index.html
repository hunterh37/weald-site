<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#030604">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Weald</title>
<meta name="description" content="Weald — a new terminal for macOS.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#030604}
body{
  color:#EBF2F0;
  font-family:'Space Grotesk',system-ui,sans-serif;
  min-height:100vh;min-height:100svh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;-webkit-font-smoothing:antialiased;position:relative}

/* live, slowly drifting, heavily blurred gradient field — covers full screen incl. notch/safe areas */
.field{position:fixed;inset:-30%;
  width:calc(100vw + 60%);height:calc(100dvh + 60%);
  z-index:0;filter:blur(90px) saturate(1.15)}
.blob{position:absolute;border-radius:50%;opacity:.255;mix-blend-mode:screen}
.b1{width:50vw;height:50vw;background:#1F8A70;top:2%;left:8%;animation:drift1 26s ease-in-out infinite}
.b2{width:44vw;height:44vw;background:#0E6B57;top:35%;left:48%;animation:drift2 32s ease-in-out infinite}
.b3{width:38vw;height:38vw;background:#0A4A3C;top:55%;left:18%;animation:drift3 38s ease-in-out infinite}
@keyframes drift1{50%{transform:translate(14vw,10vh) scale(1.15)}}
@keyframes drift2{50%{transform:translate(-16vw,-8vh) scale(.9)}}
@keyframes drift3{50%{transform:translate(10vw,-12vh) scale(1.1)}}

.hero{position:relative;z-index:1;text-align:center;padding:24px}
h1{font-weight:700;letter-spacing:-.03em;line-height:1;
  font-size:clamp(72px,18vw,220px);
  background:linear-gradient(180deg,#fff,#B9D8CE);
  -webkit-background-clip:text;background-clip:text;color:transparent}
p.sub{margin-top:20px;font-family:'JetBrains Mono',ui-monospace,monospace;
  font-size:clamp(13px,2.2vw,16px);letter-spacing:.04em;color:rgba(235,242,240,.62)}

/* shared glass surface — frosted, hairline border, specular top edge */
.glass{position:relative;isolation:isolate;
  background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.02));
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1px solid rgba(255,255,255,.14);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(0,0,0,.25);
  transition:transform .25s cubic-bezier(.2,.8,.2,1),border-color .25s,box-shadow .25s}
.glass::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:-1;
  background:radial-gradient(120% 80% at 50% -20%,rgba(255,255,255,.18),transparent 60%)}

.curl{margin:40px auto 0;display:inline-flex;align-items:center;gap:14px;max-width:92vw;
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13.5px;text-align:left;
  padding:15px 17px;cursor:pointer}
.curl:hover{transform:translateY(-1px);border-color:rgba(52,211,153,.45)}
.curl code{white-space:nowrap;overflow-x:auto;color:#EBF2F0}
.curl .p{color:#34D399}.curl .f{color:rgba(235,242,240,.45)}
.copy{font-family:inherit;font-size:11px;font-weight:600;color:#EBF2F0;flex-shrink:0;
  border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:6px 12px;
  background:rgba(255,255,255,.06);cursor:pointer;transition:.18s}
.copy:hover{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.5);color:#7DE9C0}
.copy.done{background:#34D399;color:#06110C;border-color:#34D399}

.buy{display:flex;width:min(420px,92vw);margin:16px auto 0;align-items:center;justify-content:center;gap:10px;
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;font-weight:600;
  color:#EAFFF7;text-decoration:none;cursor:pointer;padding:16px 22px;overflow:hidden;
  background:linear-gradient(160deg,rgba(52,211,153,.34),rgba(52,211,153,.12));
  border:1px solid rgba(52,211,153,.5);
  box-shadow:0 10px 40px rgba(52,211,153,.22),inset 0 1px 0 rgba(255,255,255,.35),inset 0 -1px 0 rgba(0,0,0,.2)}
.buy::before{background:radial-gradient(120% 80% at 50% -20%,rgba(255,255,255,.35),transparent 55%)}
.buy:hover{transform:translateY(-2px);border-color:rgba(52,211,153,.8);
  box-shadow:0 18px 56px rgba(52,211,153,.38),inset 0 1px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(0,0,0,.2)}
.buy .amt{opacity:.75;font-weight:500}

.social{position:fixed;bottom:calc(26px + env(safe-area-inset-bottom));left:0;right:0;z-index:2;display:flex;justify-content:center}
.social a{display:grid;place-items:center;width:44px;height:44px;border-radius:50%;color:#fff;opacity:.85;
  transition:transform .25s cubic-bezier(.2,.8,.2,1),border-color .25s,opacity .25s}
.social a:hover{opacity:1;transform:translateY(-1px);border-color:rgba(255,255,255,.3)}
.social svg{width:19px;height:19px;display:block;fill:currentColor}
</style>
</head>
<body>
<div class="field"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
<main class="hero">
  <h1>WEALD</h1>
  <p class="sub">A new terminal for macOS</p>
  <div class="curl glass" id="curl" title="Click to copy">
    <code><span class="p">➜</span> curl -LO <span class="f">https://hunterh37.github.io/weald-site/</span>Weald.dmg</code>
    <button class="copy" id="copyBtn">copy</button>
  </div>
  <a class="buy glass" href="https://wealdapp.gumroad.com/l/ftxdxa">Purchase lifetime license <span class="amt">· $10</span></a>
</main>
<div class="social"><a class="glass" href="https://x.com/weald_app" target="_blank" rel="noopener" aria-label="X (Twitter)">
<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>
</a></div>

<script>
const cmd='curl -LO https://hunterh37.github.io/weald-site/Weald.dmg';
const btn=document.getElementById('copyBtn');
document.getElementById('curl').addEventListener('click',async()=>{
  try{await navigator.clipboard.writeText(cmd);btn.textContent='copied ✓';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('done')},1600);}catch(e){}
});
</script>
</body>
</html>
